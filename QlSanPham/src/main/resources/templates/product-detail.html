<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm | Luvi Shop</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            var(--primary-color): #6366f1;
            var(--primary-hover): #4f46e5;
            var(--bg-color): #f8fafc;
            var(--card-bg): #ffffff;
            var(--text-main): #1e293b;
            var(--text-muted): #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #f8fafc;
            color: #1e293b;
            padding: 3rem 1rem;
            display: flex;
            justify-content: center;
        }

        /* Giới hạn chiều rộng trang chi tiết cho gọn gàng */
        .detail-container {
            width: 100%;
            max-width: 900px;
        }

        /* Nút quay lại (Breadcrumb) */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #64748b;
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 2rem;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #6366f1;
        }

        /* Card chi tiết sản phẩm chia 2 cột */
        .product-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            display: flex;
            overflow: hidden;
        }

        /* Cột trái: Hình ảnh */
        .product-image {
            flex: 1;
            background-color: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            border-right: 1px solid #e2e8f0;
        }

        .product-image i {
            font-size: 6rem;
            color: #cbd5e1;
        }

        /* Cột phải: Thông tin */
        .product-info {
            flex: 1.2;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Badge thể loại */
        .category-badge {
            align-self: flex-start;
            background-color: #e0e7ff;
            color: #4f46e5;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        .product-title {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }

        .product-id {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .product-price {
            font-size: 2rem;
            font-weight: 800;
            color: #059669; /* Màu xanh lá tạo cảm giác an tâm khi mua hàng */
            margin-bottom: 1.5rem;
        }

        .product-desc {
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        /* Nút Call to Action */
        .btn-add-cart {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .btn-add-cart:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        /* Responsive cho điện thoại */
        @media (max-width: 768px) {
            .product-card {
                flex-direction: column;
            }
            .product-image {
                min-height: 250px;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
            }
            .product-info {
                padding: 2rem;
            }
            .product-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="detail-container">
        <a th:href="@{/products}" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Quay lại danh sách
        </a>

        <div class="product-card">
            <div class="product-image">
                <i class="fa-solid fa-image"></i>
            </div>

            <div class="product-info">
                <span class="category-badge" th:text="${product.category.name}">Tên thể loại</span>
                
                <h1 class="product-title" th:text="${product.name}">Tên sản phẩm</h1>
                <p class="product-id" th:text="'Mã sản phẩm: #' + ${product.id}"></p>
                
                <div class="product-price" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></div>
                
                <p class="product-desc">
                    Sản phẩm chính hãng với thiết kế tinh tế và độ bền vượt trội. Được kiểm định chất lượng nghiêm ngặt trước khi đến tay khách hàng, mang lại trải nghiệm sử dụng tuyệt vời nhất.
                </p>

                <button class="btn-add-cart">
                    <i class="fa-solid fa-cart-shopping"></i> Thêm vào giỏ hàng
                </button>
            </div>
        </div>
    </div>

</body>
</html>
