<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm | Luvi Shop</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Bảng màu chủ đạo */
            --primary-color: #6366f1; /* Tím xanh hiện đại */
            --bg-color: #f8fafc;      /* Xám nhạt dịu mắt */
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2.5rem 1rem;
        }

        /* Container căn giữa màn hình */
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Phần Header */
        .page-header {
            display: flex;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .icon-box {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Khung chứa bảng (Card) */
        .table-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            overflow: hidden; /* Cắt các góc nhọn của bảng bên trong */
        }

        /* Bảng hiện đại */
        .modern-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .modern-table thead {
            background-color: #f8fafc;
            border-bottom: 2px solid var(--border-color);
        }

        .modern-table th {
            padding: 1.25rem 1.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .modern-table td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
            vertical-align: middle;
        }

        /* Hiệu ứng Hover dòng */
        .modern-table tbody tr {
            transition: background-color 0.2s ease;
        }

        .modern-table tbody tr:hover {
            background-color: #f1f5f9;
        }

        /* Trái/Phải của bảng không có viền dưới ở dòng cuối */
        .modern-table tbody tr:last-child td {
            border-bottom: none;
        }

        /* Trang trí các cột chuyên biệt */
        .col-id {
            font-weight: 600;
            color: var(--text-muted);
            width: 10%;
        }

        .col-name {
            font-weight: 600;
            font-size: 1.05rem;
        }

        /* Tag giá tiền */
        .price-badge {
            background-color: #ecfdf5;
            color: #059669;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.95rem;
            display: inline-block;
        }

        /* Responsive cho điện thoại */
        @media (max-width: 768px) {
            .modern-table th, .modern-table td {
                padding: 1rem;
            }
            .page-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="page-header">
            <div class="icon-box">
                <i class="fa-solid fa-shirt"></i>
            </div>
            <h1 class="page-title">Sản phẩm Luvi Shop</h1>
        </div>

        <div class="table-card">
            <table class="modern-table">
                <thead>
                    <tr>
                        <th>Mã SP</th>
                        <th>Tên sản phẩm</th>
                        <th>Đơn giá</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="product : ${products}">
                        <td class="col-id" th:text="${'#' + product.id}"></td>
                        <td class="col-name" th:text="${product.name}"></td>
                        <td>
                            <span class="price-badge" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
